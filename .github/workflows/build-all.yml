name: Build and Push All Containers
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Build and push circFL-seq
        uses: docker/build-push-action@v5
        with:
          context: ./circFL-seq
          platforms: linux/amd64
          push: true
          tags: quay.io/anrusakovich/circfl-seq:latest

      - name: Build and push CIRI-long
        uses: docker/build-push-action@v5
        with:
          context: ./CIRI-long
          platforms: linux/amd64
          push: true
          tags: quay.io/anrusakovich/ciri-long:latest

      - name: Build and push isoCIRC
        uses: docker/build-push-action@v5
        with:
          context: ./CIRI-long
          platforms: linux/amd64
          push: true
          tags: quay.io/anrusakovich/isocirc:latest